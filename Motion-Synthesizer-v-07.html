  else if(g.layout==='text-pack'){const tp=L.textP||{};x=`${H_('Text',`<input class="pi" id="l-tp-text" value="${tp.text||'HELLO'}">`)}${H_('Font',SEL('l-tp-font',FONTS,tp.font||'Impact'))}${H_('Weight',SEL('l-tp-wt',['100','200','300','400','500','600','700','800','900'],tp.weight||'700'))}${H_('Scale',RN('l-tp-fs',tp.fontSize||Math.round(Math.min(S.W,S.H)*0.6),50,3000,10))}${H_('Spacing',RN('l-sx',L.sx||60,5,300,1))}${H_('Offset X',RN('l-ox',L.ox||0,-1200,1200,1))}${H_('Offset Y',RN('l-oy',L.oy||0,-1200,1200,1))}`;}
  else if(g.layout==='radial') x=`${H_('Count',RN('l-n',L.n,2,120,1))}${H_('Radius',RN('l-r',L.r,10,1200,1))}${H_('Start°',RN('l-ang',L.ang,-3.14,3.14,.01))}`;
  else x=`${H_('Count',RN('l-n',L.n,2,120,1))}${H_('Spacing X',RN('l-sx',L.sx,10,800,1))}${H_('Spacing Y',RN('l-sy',L.sy,10,800,1))}${H_('Offset X',RN('l-ox',L.ox,-1200,1200,1))}${H_('Offset Y',RN('l-oy',L.oy,-1200,1200,1))}`;
  if(g.layout==='obj-mesh'){
    if(!g.L.mesh3d) g.L.mesh3d = {};
    const mp=g.L.mesh3d;
    if(!mp.source) mp.source='primitive';
    if(!mp.primType) mp.primType='sphere';
    if(!mp.primParams) mp.primParams={};
    if(mp.scale==null) mp.scale=500; if(mp.fov==null) mp.fov=2.5; if(mp.maxPts==null) mp.maxPts=300;
    const isPrim=!mp.source||mp.source==='primitive';
    const isTextSrc=mp.source==='text';
    const isObj=mp.source==='obj';
    const pp=mp.primParams||{};
    // Source toggle
    let srcUI=`<div class="pr"><label>Source</label><div class="v"><div class="mode-pill">
      <button id="m3-src-prim" class="${isPrim?'on':''}" onclick="setMeshSource('${g.id}','primitive')">Primitive</button>
      <button id="m3-src-text" class="${isTextSrc?'on':''}" onclick="setMeshSource('${g.id}','text')">Text</button>
      <button id="m3-src-obj" class="${isObj?'on':''}" onclick="setMeshSource('${g.id}','obj')">OBJ</button>
    </div></div></div>`;
    let srcBody='';
    if(isTextSrc){
      const tp=mp.textParams||(mp.textParams={text:'TYPE',family:'Anton',weight:'700',depth:0.3,density:8});
      const tfOpts=[['Anton','Anton'],['Bebas Neue','Bebas Neue'],['DM Serif Display','DM Serif Display'],['Inter','Inter'],['Oswald','Oswald'],['Space Grotesk','Space Grotesk'],['Space Mono','Space Mono']];
      const twOpts=[['400','Regular'],['700','Bold'],['900','Black']];
      srcBody=`<div class="pr"><label>Text</label><div class="v"><input class="pi" id="m3-txt" value="${tp.text||'TYPE'}" style="font-size:13px;font-weight:700"></div></div>`;
      srcBody+=H_('Font',`<select class="ps" id="m3-tfam">${tfOpts.map(([v,l])=>`<option value="${v}"${tp.family===v?' selected':''}>${l}</option>`).join('')}</select>`);
      srcBody+=H_('Weight',`<select class="ps" id="m3-twt">${twOpts.map(([v,l])=>`<option value="${v}"${tp.weight===v?' selected':''}>${l}</option>`).join('')}</select>`);
      srcBody+=H_('Depth',RN('m3-tdep',tp.depth??0.3,0,2,.01));
      srcBody+=H_('Density',RN('m3-tden',tp.density||8,2,20,1));
    } else if(isPrim){
      const ptOpts=[['sphere','Sphere'],['icosphere','Icosphere'],['box','Box'],['tube','Tube'],['torus','Torus'],['cone','Cone'],['plane','Plane'],['helix','Helix'],['mobius','Möbius']];
      srcBody=H_('Type',`<select class="ps" id="m3-pt">${ptOpts.map(([v,l])=>`<option value="${v}"${mp.primType===v?' selected':''}>${l}</option>`).join('')}</select>`);
      const pt=mp.primType||'sphere';
      if(pt==='sphere')   srcBody+=H_('Segments',RN('m3-pp-segs',pp.segs||32,3,128,1));
      if(pt==='icosphere') srcBody+=H_('Detail',RN('m3-pp-detail',pp.detail||2,0,4,1));
      if(pt==='box')      srcBody+=H_('Width',RN('m3-pp-w',pp.w||1,0.1,4,.01))+H_('Height',RN('m3-pp-h',pp.h||1,0.1,4,.01))+H_('Depth',RN('m3-pp-d',pp.d||1,0.1,4,.01))+H_('W Segs',RN('m3-pp-segsW',pp.segsW||4,1,20,1))+H_('H Segs',RN('m3-pp-segsH',pp.segsH||4,1,20,1));
      if(pt==='tube')     srcBody+=H_('Radius',RN('m3-pp-radius',pp.radius||0.5,0.05,2,.01))+H_('Height',RN('m3-pp-h',pp.h||1,0.1,4,.01))+H_('Segments',RN('m3-pp-segs',pp.segs||24,3,128,1))+H_('H.Segs',RN('m3-pp-hsegs',pp.heightSegs||8,1,32,1));
      if(pt==='torus')    srcBody+=H_('Major R',RN('m3-pp-R',pp.R||0.7,0.1,2,.01))+H_('Minor R',RN('m3-pp-r',pp.r||0.3,0.05,1,.01))+H_('Segs',RN('m3-pp-segs',pp.segsR||32,3,128,1))+H_('Ring Segs',RN('m3-pp-segsr',pp.segsr||16,3,64,1));
      if(pt==='cone')     srcBody+=H_('Radius',RN('m3-pp-radius',pp.radius||0.5,0.05,2,.01))+H_('Height',RN('m3-pp-h',pp.h||1,0.1,4,.01))+H_('Segments',RN('m3-pp-segs',pp.segs||24,3,128,1))+H_('H.Segs',RN('m3-pp-hsegs',pp.heightSegs||6,1,32,1));
      if(pt==='plane')    srcBody+=H_('Width',RN('m3-pp-w',pp.w||2,0.1,4,.01))+H_('Height',RN('m3-pp-h',pp.h||2,0.1,4,.01))+H_('X Segs',RN('m3-pp-segsX',pp.segsX||20,1,80,1))+H_('Y Segs',RN('m3-pp-segsY',pp.segsY||20,1,80,1));
      if(pt==='helix')    srcBody+=H_('Radius',RN('m3-pp-radius',pp.radius||0.5,0.05,2,.01))+H_('Height',RN('m3-pp-h',pp.h||2,0.1,6,.01))+H_('Turns',RN('m3-pp-turns',pp.turns||3,1,20,.1))+H_('Points',RN('m3-pp-pts',pp.pts||200,8,1000,1));
      if(pt==='mobius')   srcBody+=H_('Radius',RN('m3-pp-R',pp.R||1,0.2,3,.01))+H_('Width',RN('m3-pp-w',pp.w||0.4,0.05,2,.01))+H_('Segments',RN('m3-pp-segs',pp.segs||80,8,256,1))+H_('W.Segs',RN('m3-pp-wsegs',pp.widthSegs||8,2,32,1));
    } else {
      const vCount=g._mesh3d?g._mesh3d.length:0;
      srcBody=`<div class="pr"><label>File</label><div class="v" style="display:flex;gap:5px;align-items:center">
        <button class="hbtn" style="height:24px;padding:0 8px;font-size:10px" onclick="triggerOBJImport('${g.id}')">Import OBJ</button>
        <span style="color:var(--text3);font-size:10px">${vCount?vCount+' verts':'no mesh'}</span>
      </div></div>`;
    }
    x=srcUI+srcBody+
    H_('Rot X',RN('m3-rx',mp.rotX||0,-Math.PI,Math.PI,.01))+
    H_('Rot Y',RN('m3-ry',mp.rotY||0,-Math.PI,Math.PI,.01))+
    H_('Rot Z',RN('m3-rz',mp.rotZ||0,-Math.PI,Math.PI,.01))+
    H_('Scale',RN('m3-sc',mp.scale||500,50,4000,1))+
    H_('FOV',RN('m3-fov',mp.fov||2.5,0.5,10,.05))+
    H_('Offset X',RN('m3-cx',mp.cx||0,-1000,1000,1))+
    H_('Offset Y',RN('m3-cy',mp.cy||0,-1000,1000,1))+
    H_('Max Points',RN('m3-mp',mp.maxPts||300,10,5000,1));
    // Deformers section
    const dfms=mp.deformers||[];
    const gid=g.id;
    const axSel=(did,key,val)=>`<select class="ps" onchange="setDeformerParam('${gid}','${did}','${key}',this.value)">
      <option value="y"${val==='y'?' selected':''}>Y</option>
      <option value="x"${val==='x'?' selected':''}>X</option>
      <option value="z"${val==='z'?' selected':''}>Z</option></select>`;
    const dfmRN=(did,key,v,mn,mx,st)=>`<input type="range" style="flex:1" min="${mn}" max="${mx}" step="${st}" value="${v}" oninput="setDeformerParam('${gid}','${did}','${key}',+this.value)">`;
    let dfmHTML=`<div class="sp-divider">Deformers</div>`;
    dfmHTML+=dfms.map(d=>{
      const dp=d.params; let par='';
      if(d.type==='twist'){
        par+=H_('Amount',dfmRN(d.id,'angle',dp.angle??1.5,-6.28,6.28,0.05));
        par+=H_('Axis',axSel(d.id,'axis',dp.axis||'y'));
      } else if(d.type==='bend'){
        par+=H_('Angle',dfmRN(d.id,'angle',dp.angle??1.5,-6.28,6.28,0.05));
        par+=H_('Axis',axSel(d.id,'axis',dp.axis||'y'));
      } else if(d.type==='noise'){
        par+=H_('Strength',dfmRN(d.id,'strength',dp.strength??0.2,0,2,0.01));
        par+=H_('Frequency',dfmRN(d.id,'freq',dp.freq??3,0.1,20,0.1));
        par+=H_('Seed',dfmRN(d.id,'seed',dp.seed??1,1,99,1));
      } else if(d.type==='wave'){
        par+=H_('Amplitude',dfmRN(d.id,'amplitude',dp.amplitude??0.3,0,3,0.01));
        par+=H_('Frequency',dfmRN(d.id,'freq',dp.freq??3,0.1,20,0.1));
        par+=H_('Dir',axSel(d.id,'dir',dp.dir||'x'));
        par+=H_('Displace',axSel(d.id,'axis',dp.axis||'y'));
      } else if(d.type==='taper'){
        par+=H_('Amount',dfmRN(d.id,'amount',dp.amount??0.5,-2,2,0.01));
        par+=H_('Axis',axSel(d.id,'axis',dp.axis||'y'));
      } else if(d.type==='inflate'){
        par+=H_('Amount',dfmRN(d.id,'amount',dp.amount??0.5,-2,2,0.01));
      }
      return `<div class="dfm-block${d.enabled?'':' bypassed'}">
        <div class="dfm-head">
          <button class="bypass-btn${d.enabled?' on':''}" onclick="toggleDeformer('${gid}','${d.id}')"></button>
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);flex:1">${DEFORMER_DEFS[d.type]?.label||d.type}</span>
          <span style="color:var(--text3);cursor:pointer;font-size:15px;line-height:1" onclick="removeDeformer('${gid}','${d.id}')">×</span>
        </div>
        <div class="dfm-body">${par}</div>
      </div>`;
    }).join('');
    dfmHTML+=`<div class="dfm-add">${Object.entries(DEFORMER_DEFS).map(([t,v])=>`<button class="hbtn" style="font-size:9px;padding:0 7px;height:22px" onclick="addDeformer('${gid}','${t}')">+ ${v.label}</button>`).join('')}</div>`;
    x+=dfmHTML;
  }
  return H_('Type',SEL('l-type',LAYOUTS,g.layout))+x;
}
function colorTab(g){
  g.gradient = g.gradient||{stops:[{color:'#e8ff00',pos:0},{color:'#00d4ff',pos:1}],source:'sequential'};
  const isGrad = g.colorMode==='gradient';
  const pill=`<div class="mode-pill" style="margin-bottom:10px;width:100%"><button style="flex:1" class="${!isGrad?'on':''}" onclick="setColorMode('${g.id}','palette')">Palette</button><button style="flex:1" class="${isGrad?'on':''}" onclick="setColorMode('${g.id}','gradient')">Gradient</button></div>`;
  if(!isGrad){
    const sw=g.colors.map((c,i)=>`<div class="sw" style="background:${c}"><input type="color" value="${c}" data-i="${i}" class="ci">${g.colors.length>1?`<span class="sx" data-i="${i}">×</span>`:''}</div>`).join('');
    return pill+`<div style="font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:6px">Fill Colors</div><div class="swatches">${sw}<div class="sw-add" id="cadd">+</div></div>`;
  }
  const gr=g.gradient;
  const stopRows=gr.stops.map((s,i)=>`<div class="grad-stop-row"><input type="color" class="gsc" data-i="${i}" value="${s.color}"><input type="range" class="gsp" min="0" max="1" step="0.005" data-i="${i}" value="${s.pos}"><span class="gs-pct">${Math.round(s.pos*100)}%</span>${gr.stops.length>2?`<span class="gsdel" data-i="${i}">×</span>`:''}</div>`).join('');
  return pill+`<div class="grad-bar" style="background:${gradientCSS(gr.stops)}"></div><div id="grad-stops">${stopRows}</div>${H_('Source',SEL('grad-src',PHASE_MODES,gr.source||'sequential'))}<div class="grad-actions"><button id="grad-add">+ Stop</button><button id="grad-rnd">Randomize</button><button id="grad-pal">→ Palette</button></div>`;
}
function motionTab(g){
  const blocks=g.anims.map((a,ai)=>{
    const isOsc=a.mode==='oscillate';
    const kfBlock=`${H_('From',RN(`af-${a.id}`,a.from,-2000,2000,.01))}${H_('To',RN(`at-${a.id}`,a.to,-2000,2000,.01))}${H_('Duration',RN(`ad-${a.id}`,a.dur,.05,60,.05))}${H_('Delay',RN(`adl-${a.id}`,a.delay,0,60,.05))}${H_('Easing',SEL(`ae-${a.id}`,EASINGS,a.easing))}${H_('Loop',SEL(`al-${a.id}`,LOOP_MODES,a.loop))}${H_('Stagger',SEL(`ast-${a.id}`,PHASE_MODES,a.stagger))}${H_('Stg Time',RN(`adt-${a.id}`,a.staggerTime,0,30,.05))}`;
    const oscBlock=`${H_('Min',RN(`af-${a.id}`,a.from,-2000,2000,.01))}${H_('Max',RN(`at-${a.id}`,a.to,-2000,2000,.01))}${H_('Frequency',RN(`aq-${a.id}`,a.freq,.01,10,.01))}${H_('Phase Mode',SEL(`aps-${a.id}`,PHASE_MODES,a.phase))}${H_('Phase Sprd',RN(`app-${a.id}`,a.phaseSpread||1,0,4,.01))}`;
    const propLabel=a.prop.startsWith('fx_')?getFxPropLabel(a.prop):(PROP_LABELS[a.prop]||a.prop);
    return `<div class="ablock${a.bypassed?' bypassed':''}"><span class="adel" onclick="delAnim('${g.id}','${a.id}')">×</span><span class="adup" onclick="dupAnim('${g.id}','${a.id}')" title="Duplicate">⧉</span><div class="atitle"><button class="bypass-btn${a.bypassed?'':' on'}" onclick="toggleBypass('${g.id}','${a.id}')" title="Enable / Bypass"></button>Anim ${ai+1} — ${propLabel}</div><div class="ablock-body">${H_('Property',SEL_PROPS(`ap-${a.id}`,getProps(g),a.prop))}<div class="mode-pill"><button class="${!isOsc?'on':''}" onclick="setAnimMode('${g.id}','${a.id}','keyframe')">Keyframe</button><button class="${isOsc?'on':''}" onclick="setAnimMode('${g.id}','${a.id}','oscillate')">Oscillate</button></div>${isOsc?oscBlock:kfBlock}</div></div>`;
  }).join('');
  return blocks+`<button class="add-anim" onclick="addAnim('${g.id}')">+ Add Animation</button>`;
}

function toggleTrail(gid){
  const g=S.groups.find(x=>x.id===gid); if(!g) return;
  pushHistory();
  g.trail=g.trail||mkTrail(); g.trail.enabled=!g.trail.enabled;
  buildGroup(g); renderRP(); renderFrame(S.pb.t);
}
function setColorMode(gid,mode){
  const g=S.groups.find(x=>x.id===gid); if(!g) return;
  pushHistory(); g.colorMode=mode; buildGroup(g); renderRP(); renderFrame(S.pb.t);
}
function gradToPalette(gid){
  const g=S.groups.find(x=>x.id===gid); if(!g) return;
  pushHistory();
  const n=Math.max(6,Math.min(16,(g._pos||[]).length||8));
  g.colors=Array.from({length:n},(_,i)=>{
    const col=sampleGradient(g.gradient.stops,i/(n-1||1));
    return hexStr(col);
  });
  g.colorMode='palette'; buildGroup(g); renderRP(); renderFrame(S.pb.t);
}
function toggleBypass(gid,aid){
  const g=S.groups.find(x=>x.id===gid); if(!g) return;
  const a=g.anims.find(x=>x.id===aid); if(!a) return;
  pushHistory();
  a.bypassed=!a.bypassed;
  renderRP(); renderFrame(S.pb.t);
}
function setAnimMode(gid,aid,mode){
  const g=S.groups.find(x=>x.id===gid); if(!g) return;
  const a=g.anims.find(x=>x.id===aid); if(!a) return;
  pushHistory();
  a.mode=mode; buildGroup(g); renderRP();
}
function addDeformer(gid, type){
  const g=S.groups.find(x=>x.id===gid); if(!g||!g.L.mesh3d) return;
  pushHistory();
  if(!g.L.mesh3d.deformers) g.L.mesh3d.deformers=[];
  g.L.mesh3d.deformers.push(mkDeformer(type));
  buildGroup(g); renderGroups(); renderRP(); renderFrame(S.pb.t);
}
function removeDeformer(gid, did){
  const g=S.groups.find(x=>x.id===gid); if(!g||!g.L.mesh3d) return;
  pushHistory();
  g.L.mesh3d.deformers=(g.L.mesh3d.deformers||[]).filter(d=>d.id!==did);
  buildGroup(g); renderGroups(); renderRP(); renderFrame(S.pb.t);
}
function toggleDeformer(gid, did){
  const g=S.groups.find(x=>x.id===gid); if(!g||!g.L.mesh3d) return;
  const d=(g.L.mesh3d.deformers||[]).find(x=>x.id===did); if(!d) return;
  d.enabled=!d.enabled;
  buildGroup(g); renderGroups(); renderRP(); renderFrame(S.pb.t);
}
function setDeformerParam(gid, did, key, val){
  const g=S.groups.find(x=>x.id===gid); if(!g||!g.L.mesh3d) return;
  const d=(g.L.mesh3d.deformers||[]).find(x=>x.id===did); if(!d) return;
  d.params[key]=val;
  buildGroup(g); renderGroups(); renderFrame(S.pb.t);
}
function addAnim(gid){
  const g=S.groups.find(x=>x.id===gid); if(!g) return;
  pushHistory();
  g.anims.push(mkAnim({mode:'oscillate',prop:'opacity',from:.1,to:1,freq:.4}));
  buildGroup(g); renderRP();
}
function delAnim(gid,aid){
  const g=S.groups.find(x=>x.id===gid); if(!g) return;
  pushHistory();
  g.anims=g.anims.filter(a=>a.id!==aid); buildGroup(g); renderRP();
}
function dupAnim(gid,aid){
  const g=S.groups.find(x=>x.id===gid); if(!g) return;
  const src=g.anims.find(x=>x.id===aid); if(!src) return;
  pushHistory();
  const clone=Object.assign({},src,{id:'a'+(S._uid++)});
  const idx=g.anims.indexOf(src);
  g.anims.splice(idx+1,0,clone);
  buildGroup(g); renderRP();
}

// ─── BIND TAB ─────────────────────────────────────────────
function bindTab(g){
  function bRN(id,fn){ const r=document.getElementById(id),n=document.getElementById(id+'_n');if(!r||!n)return;r.oninput=()=>{n.value=r.value;fn(+r.value)};n.oninput=()=>{r.value=n.value;fn(+n.value)}; }
  function bSEL(id,fn){ const el=document.getElementById(id);if(el)el.onchange=()=>fn(el.value); }
  function bINP(id,fn){ const el=document.getElementById(id);if(el)el.oninput=()=>fn(el.value); }
  function rf(full=false){ if(full){buildGroup(g);renderGroups();}renderFrame(S.pb.t);pushHistory(); }
  function rfF(){buildGroup(g);renderGroups();renderFrame(S.pb.t);pushHistory();}

  if(activeTab==='shape'){
    bINP('p-nm',v=>{g.name=v;renderGroups()});
    bSEL('p-sh',v=>{g.shape=v;g.shapeP={};renderRP();rfF()});
    bRN('p-sz',v=>{g.size=v;rfF()});
    bRN('p-sv',v=>{g.sizeVar=v;rfF()});
    bRN('p-sw',v=>{g.strokeW=v;rfF()});
    const sc=document.getElementById('p-sc');if(sc)sc.oninput=e=>{g.strokeC=e.target.value;rfF()};
    const smf=document.getElementById('p-smf');if(smf)smf.onclick=()=>{g.strokeMatchFill=!g.strokeMatchFill;smf.textContent=g.strokeMatchFill?'ON':'OFF';smf.classList.toggle('on',g.strokeMatchFill);rfF()};
    // shape-specific params
    const sp=g.shapeP||(g.shapeP={});
    bRN('sp-thick',v=>{sp.thickness=v;rfF()});
    bRN('sp-aw',v=>{sp.aspectW=v;rfF()});
    bRN('sp-ah',v=>{sp.aspectH=v;rfF()});
    bRN('sp-rw',v=>{sp.rW=v;rfF()});
    bRN('sp-rh',v=>{sp.rH=v;rfF()});
    bRN('sp-cr',v=>{sp.corner=v;rfF()});
    bRN('sp-pts',v=>{sp.points=Math.round(v);rfF()});
    bRN('sp-ir',v=>{sp.innerR=v;rfF()});
    bRN('sp-armw',v=>{sp.armW=v;rfF()});
    bRN('sp-dr',v=>{sp.dotR=v;rfF()});
    bINP('sp-char',v=>{sp.char=v;rfF()});
    bSEL('sp-font',v=>{sp.font=v;rfF()});
    bSEL('sp-wt',v=>{sp.weight=v;rfF()});
    const tbgBtn=document.getElementById('sp-tbg');
    if(tbgBtn) tbgBtn.onclick=()=>{sp.textBg=!sp.textBg;tbgBtn.textContent=sp.textBg?'ON':'OFF';tbgBtn.classList.toggle('on',sp.textBg);rfF();};

// ─── USER PRESETS (localStorage) ──────────────────────────
const STORAGE_KEY = 'motionDesigner_userPresets';

function loadUserPresets() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveUserPresets(arr) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

function serializeGroup(g) {
  // Deep-clone only the data fields needed to reconstruct the group
  return {
    name: g.name, shape: g.shape, size: g.size,
    strokeW: g.strokeW, strokeC: g.strokeC,
    colors: [...g.colors],
    layout: g.layout,
    L: {...g.L},
    shapeP: g.shapeP ? {...g.shapeP} : {},
    trail: g.trail ? {...g.trail} : mkTrail(),
    gxform: g.gxform ? {...g.gxform} : {x:0,y:0,sx:1,sy:1,rot:0},
    anims: g.anims.map(a => ({...a})),
    fx: JSON.parse(JSON.stringify(S.fx || {})),
  };
}

function toggleSaveForm() {
  const form = document.getElementById('save-form');
  const open = form.style.display === 'none';
  form.style.display = open ? 'block' : 'none';
  if (open) {
    const g = S.groups.find(x => x.id === S.selId);
    const inp = document.getElementById('preset-name-input');
    inp.value = g ? g.name : '';
    inp.focus();
    inp.select();
  }
}

function confirmSavePreset() {
  const g = S.groups.find(x => x.id === S.selId);
  if (!g) { alert('Select a group first.'); return; }
  const inp = document.getElementById('preset-name-input');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }

  const arr = loadUserPresets();
  arr.push({
    name, config: serializeGroup(g),
    W: S.W, H: S.H,
    bg: S.bg, bgMode: S.bgMode,
    bgGrad: JSON.parse(JSON.stringify(S.bgGrad)),
  });
  saveUserPresets(arr);
  document.getElementById('save-form').style.display = 'none';
  renderUserPresets();
}

function deleteUserPreset(idx) {
  const arr = loadUserPresets();
  arr.splice(idx, 1);
  saveUserPresets(arr);
  renderUserPresets();
}

function renderUserPresets() {
  const grid = document.getElementById('user-pgrid');
  grid.innerHTML = '';
  const arr = loadUserPresets();
  arr.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'pb user';
    btn.title = p.name;
    btn.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block">${p.name}</span><span class="pdel" title="Delete preset">×</span>`;
    btn.onclick = e => {
      if (e.target.classList.contains('pdel')) { deleteUserPreset(i); return; }
      pushHistory();
      // Restore bg + canvas size
      if (p.bg != null) {
        S.bg = p.bg;
        document.getElementById('bgc').value = '#' + p.bg.toString(16).padStart(6, '0');
      }
      if (p.bgMode) S.bgMode = p.bgMode;
      if (p.bgGrad) S.bgGrad = JSON.parse(JSON.stringify(p.bgGrad));
      const sizeChanged = p.W && p.H && (p.W !== S.W || p.H !== S.H);
      if (p.W && p.H) {
        S.W = p.W; S.H = p.H;
        document.getElementById('sz').value = `${p.W}x${p.H}`;
      }
      // Restore fx
      if (p.config.fx) { S.fx = JSON.parse(JSON.stringify(p.config.fx)); }
      // Add group
      const clone = {...p.config, anims: p.config.anims.map(a => ({...a, id: 'a'+(S._uid++)}))};
      if (sizeChanged) {
        S.groups.push(mkGroup(clone));
        initPixi();
        renderFrame(S.pb.t);
      } else {
        buildFxFilters(); renderFxPanel();
        addGroup(clone);
        renderFrame(S.pb.t);
      }
    };
    grid.appendChild(btn);
  });
}

// ─── KEYBOARD ─────────────────────────────────────────────
function killAll(){
  // Stop playback
  pausePb();
  // Abort any running export
  _cancelExport = true;
  if(_recRef && _recRef.state !== 'inactive') _recRef.stop();
  _recRef = null;
  // Reset export UI
  const prog=document.getElementById('exp-prog'); if(prog) prog.style.display='none';
  const wb=document.getElementById('webm-btn'); if(wb){wb.disabled=false;wb.textContent='▶ WebM';}
  const mp=document.getElementById('mp4-btn'); if(mp){mp.disabled=false;}
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){e.preventDefault();killAll();return;}
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.key==='+'&&e.metaKey){e.preventDefault();setZoom(Z*1.2);}
  if(e.key==='-'&&e.metaKey){e.preventDefault();setZoom(Z*.83);}
  if(e.key==='0'&&e.metaKey){e.preventDefault();fitZoom();}
  if((e.code==='Delete'||e.code==='Backspace')&&S.selId){ removeGroup(S.selId); }
  if(e.key==='z'&&(e.metaKey||e.ctrlKey)&&!e.shiftKey){e.preventDefault();undo();}
  if(e.key==='z'&&(e.metaKey||e.ctrlKey)&&e.shiftKey){e.preventDefault();redo();}
  if(e.key==='y'&&e.ctrlKey){e.preventDefault();redo();}
});

// ─── EXPORT WebM ──────────────────────────────────────────
document.getElementById('webm-btn').onclick=async function(){
  const btn=this; btn.disabled=true; btn.textContent='…';
  const canvas=document.getElementById('pixi-canvas');
  const fps=S.fps; const dur=S.dur;
  const mime=MediaRecorder.isTypeSupported('video/mp4;codecs=avc1')?'video/mp4;codecs=avc1':MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
  const rec=new MediaRecorder(canvas.captureStream(fps),{mimeType:mime,videoBitsPerSecond:40_000_000});
  _recRef=rec; _cancelExport=false;
  const chunks=[];
  rec.ondataavailable=e=>e.data.size&&chunks.push(e.data);
  rec.onstop=()=>{ _recRef=null; if(!_cancelExport){const b=new Blob(chunks,{type:mime});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='motion.'+(mime.includes('mp4')?'mp4':'webm');a.click();} btn.disabled=false;btn.textContent='▶ WebM'; _cancelExport=false; };
  const st=S.pb.t; S.pb.t=0; rec.start();
  let f=0;const tf=Math.ceil(dur*fps);
  function cf(){if(_cancelExport||f>=tf){rec.stop();S.pb.t=st;return;}S.pb.t=f/fps;renderFrame(S.pb.t);f++;requestAnimationFrame(cf);}
  cf();
};

// ─── EXPORT MP4 (WebCodecs) ───────────────────────────────
document.getElementById('mp4-btn').onclick=async function(){
  if(!window.VideoEncoder){alert('WebCodecs requires Chrome 94+. Try "▶ WebM" instead.');return;}
  const btn=this; btn.disabled=true;
  const prog=document.getElementById('exp-prog'),bar=document.getElementById('exp-bar'),msg=document.getElementById('exp-msg');
  prog.style.display='flex';
  let Muxer,ABTarget;
  try{const m=await import('https://cdn.jsdelivr.net/npm/mp4-muxer@5/build/mp4-muxer.mjs');Muxer=m.Muxer;ABTarget=m.ArrayBufferTarget;}
  catch(e){alert('Failed to load mp4-muxer. Check internet connection.');btn.disabled=false;prog.style.display='none';return;}
  const W=S.W,H=S.H,fps=S.fps,dur=S.dur,tf=Math.ceil(dur*fps);
  const target=new ABTarget();
  const muxer=new Muxer({target,video:{codec:'avc',width:W,height:H},fastStart:'in-memory'});
  const enc=new VideoEncoder({output:(c,m)=>muxer.addVideoChunk(c,m),error:console.error});
  enc.configure({codec:'avc1.4d0032',width:W,height:H,bitrate:50_000_000,framerate:fps,latencyMode:'quality'});
  // Render to main canvas (preserveDrawingBuffer:true) so stage.filters are included,
  // then copy to OffscreenCanvas via drawImage for VideoFrame encoding.
  const off = new OffscreenCanvas(W, H);
  const offCtx = off.getContext('2d');
  const st=S.pb.t;
  _cancelExport=false;

  for(let f=0;f<tf;f++){
    if(_cancelExport) break;
    while(enc.encodeQueueSize > 10) await new Promise(r=>setTimeout(r,5));

    renderFrame(f/fps);           // render to main WebGL canvas (filters applied)
    offCtx.drawImage(app.view, 0, 0); // copy to 2D offscreen canvas

    const vf=new VideoFrame(off,{timestamp:Math.round(f/fps*1e6),duration:Math.round(1e6/fps)});
    enc.encode(vf,{keyFrame:f%30===0}); vf.close();

    const p=Math.round((f+1)/tf*100); bar.value=p; msg.textContent=`Encoding… ${p}%`;
    if(f%10===0) await new Promise(r=>setTimeout(r,0));
  }
  if(!_cancelExport){
    await enc.flush(); muxer.finalize();
    const blob=new Blob([target.buffer],{type:'video/mp4'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='motion.mp4';a.click();
  }
  S.pb.t=st; btn.disabled=false; prog.style.display='none'; _cancelExport=false;
};

// ─── RIGHT PANEL RESIZE ───────────────────────────────────
(function(){
  const lpHandle = document.getElementById('lp-resize-handle');
  lpHandle.addEventListener('mousedown', e => {
    const startX = e.clientX;
    const startW = document.getElementById('lp').getBoundingClientRect().width;
    lpHandle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    const onMove = e => {
      const w = Math.max(160, Math.min(500, startW + (e.clientX - startX)));
      ws.style.gridTemplateColumns = `${w}px 5px 1fr 5px ${document.getElementById('rp').getBoundingClientRect().width}px`;
    };
    const onUp = () => {
      lpHandle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  const handle = document.getElementById('rp-resize-handle');
  const ws = document.getElementById('ws');
  let startX, startW;
  handle.addEventListener('mousedown', e => {
    startX = e.clientX;
    startW = document.getElementById('rp').getBoundingClientRect().width;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    const onMove = e => {
      const w = Math.max(200, Math.min(600, startW + (startX - e.clientX)));
      ws.style.gridTemplateColumns = `${document.getElementById('lp').getBoundingClientRect().width}px 5px 1fr 5px ${w}px`;
    };
    const onUp = () => {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

function setMeshSource(gid, src){
  const g=S.groups.find(x=>x.id===gid); if(!g) return;
  pushHistory();
  const mp=g.L.mesh3d||(g.L.mesh3d={});
  mp.source=src;
  if(src==='primitive'){ mp.primType=mp.primType||'sphere'; mp.primParams=mp.primParams||{}; }
  if(src==='text'){ mp.textParams=mp.textParams||{text:'TYPE',family:'Anton',weight:'400',depth:0.25,density:3}; mp._textVerts=null; }
  buildGroup(g); renderGroups(); renderRP(); renderFrame(S.pb.t);
}

  const inp = document.getElementById('obj-file-input');
  inp.onchange = () => {
    const file = inp.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const verts = parseOBJ(e.target.result);
      if(!verts.length){ alert('No vertices found in OBJ file.'); return; }
      const g = S.groups.find(x=>x.id===gid); if(!g) return;
      pushHistory();
      g._mesh3d = verts;
      g.L.meshVerts = verts;
      buildGroup(g); renderGroups(); renderRP(); renderFrame(S.pb.t);
    };
    reader.readAsText(file);
    inp.value='';
  };
  inp.click();
}

// ─── INIT ─────────────────────────────────────────────────
window.addEventListener('load',()=>{
  S.bg = parseInt(document.getElementById('bgc').value.replace('#',''), 16);
  initPresets(); renderUserPresets(); initPixi();
  // Start with Size Wave preset (play_sf style)
  PRESETS[0].d();
  renderFrame(0);
  initHistory();
  renderFxPanel();
});
window.addEventListener('resize',fitZoom);
</script>
<input type="file" id="obj-file-input" accept=".obj" style="display:none">
<div id="bg-grad-panel"></div>
</body>
</html>
